# Iteration config — generated by the Coder agent.
# All paths are relative to the iteration root directory.

iteration: 5
random_seed: 42

project_root: "../../"

data:
  train: "../../data/raw/train.csv"
  test: "../../data/raw/test.csv"

target_column: "Survived"
task_type: "binary_classification"

split:
  method: "stratified"
  val_ratio: 0.2
  time_column: null
  cutoff: null

hyperparameters:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 3
  min_samples_leaf: 20
  min_samples_split: 40
  subsample: 0.8
  max_features: "sqrt"
  n_iter_no_change: 30
  validation_fraction: 0.15
  tol: 0.0001
  random_state: 42

output_paths:
  metrics: "outputs/metrics.json"
  predictions: "outputs/predictions.csv"
  learning_curves: "outputs/learning_curves.json"
  feature_importance: "outputs/feature_importance.json"
  pipeline_metadata: "outputs/pipeline_metadata.json"
  model: "outputs/model/"
  log: "execution/log.txt"
